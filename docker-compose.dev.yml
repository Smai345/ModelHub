# Development docker-compose with hot reload and debugging
version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ml_platform_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ml_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - ml_network_dev

  redis:
    image: redis:7-alpine
    container_name: ml_platform_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - ml_network_dev

  minio:
    image: minio/minio:latest
    container_name: ml_platform_minio_dev
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_dev:/data
    command: server /data --console-address ":9001"
    networks:
      - ml_network_dev

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml_platform_backend_dev
    environment:
      APP_ENV: development
      DEBUG: "true"
      SECRET_KEY: dev_secret_key_not_for_production
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ml_platform
      DATABASE_URL_SYNC: postgresql://postgres:postgres@postgres:5432/ml_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - .:/app
    command: >
      sh -c "pip install -e . && 
        python backend/init_db.py && 
        uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - ml_network_dev

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml_platform_celery_dev
    environment:
      APP_ENV: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ml_platform
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - .:/app
    command: celery -A backend.tasks.celery_app worker --loglevel=debug
    networks:
      - ml_network_dev

  flower:
    image: mher/flower:2.0.1
    container_name: ml_platform_flower_dev
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - ml_network_dev

volumes:
  postgres_data_dev:
  redis_data_dev:
  minio_data_dev:

networks:
  ml_network_dev:
    driver: bridge
